repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: uv run ruff check --fix .
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: ty
        name: ty check
        entry: uv run ty check src
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: frontend-lint
        name: frontend lint
        entry: bash -lc 'cd frontend && bun run lint'
        language: system
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx)$

      - id: frontend-format-check
        name: frontend format check
        entry: bash -lc 'cd frontend && bun run format:check'
        language: system
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx|css)$
