name: Release

on:
    release:
        types:
            - published

jobs:
    publish:
        name: Upload release to PyPI & github
        if: github.event.release.prerelease == false
        runs-on: ubuntu-latest

        environment:
            name: pypi
            url: https://pypi.org/p/voidcode

        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup uv
              uses: astral-sh/setup-uv@v7

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13"

            - name: Build package
              run: uv build

            - name: Publish package distributions to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
