[tools]
uv = "0.11.3"
bun = "1.3.11"

[env]
_.python.venv = { path = ".venv" }
PYTHONPATH = "src"

[tasks."frontend:install"]
run = "bun install"
dir = "frontend"

[tasks."frontend:dev"]
run = "bun run dev"
dir = "frontend"

[tasks."frontend:build"]
run = "bun run build"
dir = "frontend"

[tasks."frontend:lint"]
run = "bun run lint"
dir = "frontend"

[tasks."frontend:typecheck"]
run = "bun run typecheck"
dir = "frontend"

[tasks."frontend:check"]
run = "mise run frontend:lint && mise run frontend:typecheck"

[tasks.lint]
run = "uv run ruff check ."

[tasks.format]
run = "uv run ruff format ."

[tasks.typecheck]
run = "uv run basedpyright --warnings src"

[tasks.test]
run = "uv run pytest"

[tasks.check]
run = "mise run lint && mise run typecheck && mise run test && mise run frontend:check"

[tasks.pre-commit]
run = "uv run pre-commit run --all-files"
