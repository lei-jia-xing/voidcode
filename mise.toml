[tools]
uv = "0.11.3"
bun = "1.3.11"

[env]
_.python.venv = { path = ".venv" }
_.file = ".env"
PYTHONPATH = "src"
PYTHONUTF8 = "1"
PYTHONIOENCODING = "utf-8"

[tasks."frontend:install"]
run = "bun install"
dir = "frontend"

[tasks."frontend:dev"]
run = "bun run dev"
dir = "frontend"

[tasks."frontend:build"]
run = "bun run build"
dir = "frontend"

[tasks."frontend:lint"]
run = "bun run lint"
dir = "frontend"

[tasks."frontend:typecheck"]
run = "bun run typecheck"
dir = "frontend"

[tasks."frontend:test"]
run = "bun run test:run"
dir = "frontend"

[tasks."frontend:e2e"]
depends = ["frontend:build", "frontend:test:e2e:run"]

[tasks."frontend:test:e2e:run"]
run = "bun run test:e2e"
dir = "frontend"

[tasks."frontend:coverage"]
run = "bun run test:coverage"
dir = "frontend"

[tasks."frontend:check"]
depends = ["frontend:lint", "frontend:typecheck", "frontend:test"]

[tasks."frontend:check:e2e"]
depends = ["frontend:check", "frontend:e2e"]

[tasks.lint]
run = "uv run ruff check ."

[tasks.format]
run = "uv run ruff format ."

[tasks.typecheck]
run = "uv run ty check src"

[tasks.test]
run = "uv run python -X utf8 -m pytest -n auto"

[tasks."test:fast"]
run = "uv run python -X utf8 -m pytest -n auto tests/unit -m 'not slow and not fuzz'"

[tasks."test:slow"]
run = "uv run python -X utf8 -m pytest -n auto -m 'slow or fuzz'"

[tasks."test:coverage"]
run = "uv run python -X utf8 -m pytest -n auto --cov=voidcode --cov-report=term-missing"

[tasks.build]
run = "uv build"

[tasks.check]
depends = ["lint", "typecheck", "test", "frontend:check"]

[tasks.ci]
depends = ["lint", "typecheck", "test:coverage", "build", "frontend:check", "frontend:build"]

[tasks.pre-commit]
run = "uv run pre-commit run --all-files"
